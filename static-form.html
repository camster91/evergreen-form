<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Samples — Evergreen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #FFFFFF;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  -webkit-font-smoothing: antialiased;
}
.card {
  width: 100%;
  max-width: 100%;
  background: #FFFFFF;
  padding: 20px 16px;
}
.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.input-grid input, .full input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid #F2786D;
  border-radius: 999px;
  font-family: 'Fredoka', sans-serif;
  font-size: 15px;
  font-weight: 400;
  color: #2C2C2C;
  background: #fff;
  outline: none;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.input-grid input::placeholder, .full input::placeholder {
  color: #EDA8A8;
  font-weight: 600;
}
.input-grid input:focus, .full input:focus {
  border-color: #F2786D;
  box-shadow: 0 0 0 4px rgba(242,120,109,0.15);
}
.full { margin-bottom: 14px; }
.section-label {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #F2786D;
  margin: 24px 0 4px;
}
.section-hint {
  text-align: center;
  font-size: 13px;
  color: #F2786D;
  font-weight: 400;
  margin-bottom: 16px;
}
.delivery-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.delivery-row label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #F2786D;
  font-weight: 400;
  cursor: pointer;
}
.delivery-row input[type="radio"] {
  appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid #F2786D;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  background: #fff;
  transition: background .2s, border-color .2s;
}
.delivery-row input[type="radio"]:checked {
  background: #F2786D;
  border-color: #F2786D;
}
.delivery-row input[type="radio"]:checked::after {
  content: "";
  position: absolute;
  left: 4px;
  top: 4px;
  width: 6px;
  height: 6px;
  background: #fff;
  border-radius: 50%;
}
.disclaimer {
  text-align: center;
  font-size: 13px;
  color: #F2786D;
  font-weight: 400;
  margin-bottom: 16px;
}
.submit-btn {
  width: 100%;
  padding: 20px 24px;
  border: none;
  border-radius: 999px;
  font-family: 'Fredoka', sans-serif;
  font-size: 22px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #fff;
  cursor: pointer;
  background: linear-gradient(180deg, #F87D7D 0%, #F4525C 100%);
  box-shadow: 0 8px 0 #C53838;
  transition: transform 0.08s, box-shadow 0.08s;
}
.submit-btn:hover {
  transform: translateY(2px);
  box-shadow: 0 6px 0 #C53838;
}
.submit-btn:active {
  transform: translateY(6px);
  box-shadow: 0 2px 0 #C53838;
}
.submit-btn:disabled {
  background: #ccc;
  box-shadow: 0 4px 0 #999;
  cursor: not-allowed;
}
.fsf-message {
  display: none;
  padding: 14px 16px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  text-align: center;
}
.fsf-message.success {
  display: block;
  background: #e8f5e9;
  color: #2e7d32;
  border: 2px solid #2e7d32;
}
.fsf-message.error {
  display: block;
  background: #ffebee;
  color: #c62828;
  border: 2px solid #c62828;
}

.thank-you {
  display: none;
  text-align: center;
  padding: 40px 20px;
}
.thank-you.show {
  display: block;
}
.thank-you h2 {
  font-size: 28px;
  font-weight: 700;
  color: #F2786D;
  margin-bottom: 12px;
}
.thank-you p {
  font-size: 16px;
  color: #2C2C2C;
  line-height: 1.5;
}

@media (max-width: 480px) {
  body { padding: 20px 12px; }
  .card { padding: 24px 14px; }
  .input-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="card">
<div class="thank-you" id="fsf-thankyou">
  <h2>Thank You!</h2>
  <p>Your sample request has been received. We'll be in touch soon.</p>
</div>
<form id="fsf-form" method="post" action="/submit">
  <div class="input-grid">
    <input type="text" name="first_name" placeholder="first name" required maxlength="80">
    <input type="text" name="last_name" placeholder="last name" required maxlength="80">
    <input type="text" name="address1" placeholder="street" required maxlength="256">
    <input type="text" name="address2" placeholder="apartment / unit #" maxlength="128">
    <input type="text" name="region" placeholder="state" required maxlength="64">
    <input type="text" name="zip" placeholder="zip code" required maxlength="20">
  </div>
  <div class="full">
    <input type="email" name="email" placeholder="email" required maxlength="256">
  </div>
  <div class="section-label">Preferred Delivery Window</div>
  <div class="section-hint">please select only one</div>
  <div class="delivery-row">
    <label><input type="radio" name="window" value="tue-am" required><span>Tuesday 9-11am CT</span></label>
    <label><input type="radio" name="window" value="tue-pm"><span>Tuesday 4-6pm CT</span></label>
    <label><input type="radio" name="window" value="thu-am"><span>Thursday 9-11am CT</span></label>
    <label><input type="radio" name="window" value="thu-pm"><span>Thursday 4-6pm CT</span></label>
  </div>
  <div class="disclaimer">
    Orders will be delivered via Instacart or local grocery delivery service.
  </div>
  <div class="fsf-message" id="fsf-message"></div>
  <button type="submit" class="submit-btn">SUBMIT</button>
  <input type="text" name="company" style="display:none !important;" tabindex="-1" autocomplete="off" aria-hidden="true">
</form>
</div>

<script>
(function() {
  var form = document.getElementById('fsf-form');
  var msg = document.getElementById('fsf-message');
  var btn = form.querySelector('button[type="submit"]');
  var thankyou = document.getElementById('fsf-thankyou');
  var originalText = btn.textContent;
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    msg.style.display = 'none'; msg.className = 'fsf-message';
    btn.disabled = true; btn.textContent = 'Submitting...';
    var data = new FormData(form);
    fetch('/submit', { method: 'POST', body: data })
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (json.success) {
        form.style.display = 'none';
        thankyou.classList.add('show');
        form.reset();
      } else {
        msg.style.display = 'block';
        msg.textContent = json.message || 'Something went wrong.';
        msg.className = 'fsf-message error';
      }
    })
    .catch(function() { msg.style.display = 'block'; msg.textContent = 'Network error.'; msg.className = 'fsf-message error'; })
    .finally(function() { btn.disabled = false; btn.textContent = originalText; });
  });
})();
</script>
</body>
</html>
