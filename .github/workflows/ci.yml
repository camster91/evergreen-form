name: CI Build

# Build-only workflow: verifies the project builds cleanly. No deploy, no secrets required.
# This project uses Bun as its build tool.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check (if configured)
        run: |
          if grep -q '"typecheck"\|"type-check"' package.json; then
            bun run typecheck || bun run type-check || bun x tsc --noEmit
          else
            echo "No typecheck script found, skipping."
          fi
        continue-on-error: true

      - name: Lint (if configured)
        run: |
          if grep -q '"lint"' package.json; then
            bun run lint
          else
            echo "No lint script found, skipping."
          fi
        continue-on-error: true

      - name: Build
        run: bun run build
        env:
          NODE_ENV: production
          CI: true
